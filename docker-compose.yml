version: '3.8'

services:
  # PostgreSQL Database (Production Option)
  postgres:
    image: postgres:15-alpine
    container_name: techstore-db
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techstore-network

  # Backend (Spring Boot)
  backend:
    build:
      context: ./ecommerce-backend
      dockerfile: Dockerfile
    container_name: techstore-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/techstore
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RAZORPAY_API_KEY: ${RAZORPAY_API_KEY:-rzp_test_YOUR_KEY}
      RAZORPAY_API_SECRET: ${RAZORPAY_API_SECRET:-YOUR_SECRET}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-your-email@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - techstore-network
    restart: unless-stopped

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./ecommerce-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: techstore-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - techstore-network
    restart: unless-stopped

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: techstore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - techstore-network
    restart: unless-stopped

  # Nginx (Reverse Proxy - Optional)
  nginx:
    image: nginx:alpine
    container_name: techstore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - techstore-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  techstore-network:
    driver: bridge
