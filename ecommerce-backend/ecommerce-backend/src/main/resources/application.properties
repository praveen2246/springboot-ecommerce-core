# ========================================
# DEVELOPMENT CONFIGURATION
# ========================================

# Server Configuration
server.port=8080
spring.application.name=ecommerce-backend

# H2 Database (for development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# RAZORPAY CONFIGURATION (Development)
# ========================================
# Get your test keys from: https://dashboard.razorpay.com/app/settings/api-keys
# Then set environment variables:
#   Export-Environment RAZORPAY_API_KEY=your_key_id
#   Export-Environment RAZORPAY_API_SECRET=your_key_secret
razorpay.api.key=${RAZORPAY_API_KEY:}
razorpay.api.secret=${RAZORPAY_API_SECRET:}

# ========================================
# EMAIL CONFIGURATION (Development)
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=noreply@ecommerce.com

# Logging
logging.level.root=INFO
logging.level.com.ecommerce=DEBUG